# Development override: resolve the orca git deps to the local in-tree crates
# so this repo builds against an unreleased plugin-toolkit alongside a checked
# out orca repo at ../orca. Without this patch, `plugin-toolkit` /
# `plugin-toolkit-build` resolve from the pinned git tag in Cargo.toml.
#
# The toolkit surface this plugin depends on (slice-3b openapi codegen rewrite +
# progenitor-runtime re-exports) resolves from the git tag once a new rc is cut
# that contains it; until then this patch is what makes a local checkout build.
# Remove or comment out to build purely against the tag. The orca repo is
# private, so use the git CLI (which inherits the operator's authenticated
# gh / ssh credentials) to resolve the git source the `[patch]` redirects.
[net]
git-fetch-with-cli = true

[patch."https://github.com/scottdkey/orca"]
plugin-toolkit = { path = "../orca/projects/plugin-toolkit" }
plugin-toolkit-build = { path = "../orca/projects/plugin-toolkit-build" }
